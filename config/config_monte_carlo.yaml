# config/config_monte_carlo.yaml
# Monte Carlo configuration. Paths are relative to the repository root;
# place the published input data under ./inputs/ as described in README.md.
---

hyperparameters:
  hurricane_key_word: 'fema36'        # overridden by --scenario CLI flag
  hurricane_year: '2020'              # overridden by --year CLI flag
  total_num_analysis: 1               # overridden by --n-batches CLI flag
  num_threads: 1                      # overridden by --n-parallel CLI flag
  num_inner_grids: 50
  grid_size: 250
  num_inner_grids_debris: 50
  buffer: 0.000035
  roadway_inf_consideration: False
  # fragility_type = "bridge" or "roadway" or "both"
  fragility_type: "both"
  # analysis_type = "roadway" or "debris" or "both"
  analysis_type: "debris"
  # NEW: starting seed for reproducibility (samples = start_seed .. start_seed + total_num_samples - 1)
  start_seed: 0

paths:
  grid_shapefile_path: "./inputs/debris_volume_predictions/{hurricane_key_word}/{hurricane_year}/debris_volume_predictions.shp"
  building_data_path: "./inputs/debris_impact_data/buildings_location/Building_Footprint_XWalk.shp"
  crs: "epsg:4326"
  path_network: "./inputs/debris_impact_data/Galveston_County_Roads_Without_Bolivar_Peninsula.shp"
  list_of_critical_facilities:
    fire_stations: "./inputs/debris_impact_data/Fire_and_Emergency_Medical_Service_(EMS)_Stations_Without_Bolivar_Peninsula.shp"
  path_polygon: "./inputs/debris_impact_data/Tracts_Galveston_County_Without_Bolivar_Peninsula.shp"
  output_random_fields_folder: "./outputs/monte_carlo_runs/random_fields_tmp"
  output_results_folder: "./outputs/monte_carlo_runs/monte_carlo_result"
